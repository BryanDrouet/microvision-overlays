<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Floor - 1600x600</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1600px;
            height: 600px;
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
            margin: 0;
        }
        
        .container {
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        h1 {
            font-size: 50px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            font-weight: 700;
        }
        
        .resolution {
            font-size: 35px;
            margin-bottom: 15px;
            opacity: 0.95;
            font-weight: 300;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .status-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .status-item h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .status-item p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .activity-indicator {
            position: absolute;
            bottom: 15px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; }
            50% { box-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00; }
        }
        
        .counter {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SECOND FLOOR</h1>
        <div class="resolution">1600 × 600 px</div>
        
        <div class="status-grid">
            <div class="status-item">
                <h3>🔌 Alimentation</h3>
                <p>OK</p>
            </div>
            <div class="status-item">
                <h3>🌡️ Température</h3>
                <p>23°C</p>
            </div>
            <div class="status-item">
                <h3>💾 Mémoire</h3>
                <p>87%</p>
            </div>
            <div class="status-item">
                <h3>📶 Réseau</h3>
                <p>✓ Actif</p>
            </div>
        </div>
    </div>
    
    <div class="activity-indicator"></div>
    <div class="counter"><span id="counter">0</span> événements</div>
    
    <script>
        let count = 0;
        setInterval(() => {
            count++;
            if (count > 999) count = 0;
            document.getElementById('counter').textContent = count;
        }, 3000);
    </script>
</body>
</html>
