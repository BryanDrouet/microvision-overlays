<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Screen - 3800x2200</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 3800px;
            height: 2200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        h1 {
            font-size: 90px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 700;
        }
        
        .resolution {
            font-size: 60px;
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
            max-width: 3600px;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .info-box h3 {
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        .info-box p {
            font-size: 28px;
            opacity: 0.9;
            line-height: 1.4;
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 25px;
            background: rgba(0, 200, 100, 0.3);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid rgba(0, 200, 100, 0.6);
        }
        
        .timestamp {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 25px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MAIN SCREEN</h1>
        <div class="resolution">3800 × 2200 px</div>
        
        <div class="info-grid">
            <div class="info-box">
                <h3>🎮 Type</h3>
                <p>Écran Géant<br>Principal</p>
            </div>
            <div class="info-box">
                <h3>📊 Utilisation</h3>
                <p>Affichage Principal<br>Statut Global</p>
            </div>
            <div class="info-box">
                <h3>⚙️ Config</h3>
                <p>Optimisé pour<br>Grande Salle</p>
            </div>
        </div>
    </div>
    
    <div class="status">✓ CONNECTÉ</div>
    <div class="timestamp" id="time"></div>
    
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
